<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap 4 Input Groups Demo</title>
  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body class="p-4">

  <h2>Bootstrap 4 Input Groups</h2>

  <!-- Basic Input Group -->
  <h4>Basic Input Group</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">@</span>
    </div>
    <input type="text" class="form-control" placeholder="Username">
  </div>

  <!-- Input Group Sizing -->
  <h4>Input Group Sizing</h4>
  <div class="input-group input-group-lg mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">Large</span>
    </div>
    <input type="text" class="form-control">
  </div>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">Default</span>
    </div>
    <input type="text" class="form-control">
  </div>
  <div class="input-group input-group-sm mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">Small</span>
    </div>
    <input type="text" class="form-control">
  </div>

  <!-- Multiple Inputs and Helpers -->
  <h4>Multiple Inputs and Helpers</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">First & Last</span>
    </div>
    <input type="text" class="form-control" placeholder="First name">
    <input type="text" class="form-control" placeholder="Last name">
  </div>

  <!-- Input Group with Checkboxes -->
  <h4>Input Group with Checkboxes</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <div class="input-group-text">
        <input type="checkbox">
      </div>
    </div>
    <input type="text" class="form-control" placeholder="With checkbox">
  </div>

  <!-- Input Group with Radios -->
  <h4>Input Group with Radios</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <div class="input-group-text">
        <input type="radio">
      </div>
    </div>
    <input type="text" class="form-control" placeholder="With radio">
  </div>

  <!-- Input Group Buttons -->
  <h4>Input Group Buttons</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <button class="btn btn-outline-secondary" type="button">Button</button>
    </div>
    <input type="text" class="form-control" placeholder="With button">
  </div>

  <!-- Input Group with Dropdown Button -->
  <h4>Input Group with Dropdown Button</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <button class="btn btn-outline-primary dropdown-toggle" type="button" data-toggle="dropdown">
        Dropdown
      </button>
      <div class="dropdown-menu">
        <a class="dropdown-item" href="#">Option 1</a>
        <a class="dropdown-item" href="#">Option 2</a>
      </div>
    </div>
    <input type="text" class="form-control" placeholder="With dropdown">
  </div>

  <!-- Input Group Labels -->
  <h4>Input Group Labels</h4>
  <div class="input-group mb-3">
    <div class="input-group-prepend">
      <span class="input-group-text">Label</span>
    </div>
    <input type="text" class="form-control" placeholder="With label">
  </div>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
